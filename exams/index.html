      <style>
        #root .preload {
          background: linear-gradient(90deg, rgb(54, 91, 164) 0%, rgb(1, 90, 125) 100%);
          height: 100dvh;
          width: 100dvw;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 16px;
          color: white;
          font-family: 'Poppins', sans-serif;
        }

        #root .preload img {
          height: 192px;
          width: 192px;
          filter: drop-shadow(0 0 16px #803ec2);
          border-radius: 16px;
        }

        #root .preload .spinner {
          height: 32px;
          width: 32px;
          border: 2px solid #fff;
          border-top: 2px solid #803ec2;
          border-radius: 50%;
        }

        #root .preload .spinner {
          animation: spin 0.4s linear infinite;
        }

        #root .preload a {
          color: white;
          text-decoration: underline;
        }

        #root .preload mt-4 {
          margin-top: 16px;
        }

        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }

          100% {
            transform: rotate(360deg);
          }
        }

        #root .preload h4 {
          font-size: 24px;
          font-weight: 600;
          color: #fff;
          text-align: center;
          text-shadow: 0 0 16px #803ec2;
          height: 10dvh;
        }

        #root .preload h4 span {
          display: block;
          font-size: 16px;
          font-weight: 400;
          font-family: 'Inter', sans-serif;
          color: #fff;
        }

        #root .preload h4 span {
          opacity: 0;
          height: 0;
        }

        #root .preload h4 span:nth-child(1) {
          animation: showSpan 14s infinite;
          display: block;
        }

        #root .preload h4 span:nth-child(2) {
          animation: showSpan 14s infinite 2s;
          display: block;
        }

        #root .preload h4 span:nth-child(3) {
          animation: showSpan 14s infinite 4s;
          display: block;
        }

        #root .preload h4 span:nth-child(4) {
          animation: showSpan 14s infinite 6s;
          display: block;
        }

        #root .preload h4 span:nth-child(5) {
          animation: showSpan 14s infinite 8s;
          display: block;
        }

        #root .preload h4 span:nth-child(6) {
          animation: showSpan 14s infinite 10s;
          display: block;
        }

        #root .preload h4 span:nth-child(7) {
          animation: showSpan 14s infinite 12s;
          display: block;
        }

        @keyframes showSpan {
          0%,
          20% {
            opacity: 1;
            height: 100%;
          }

          21%,
          100% {
            opacity: 0;
            height: 0;
          }
        }

        body {
          padding: 0;
          margin: 0;
        }
      </style>
